{% extends 'empleados/base.html' %}
{% block content %}
<div class="page-body"><div class="container-fluid"><div class="page-title"><div class="row"><div class="col-6"><h4>{{ titulo }}</h4></div><div class="col-6"><ol class="breadcrumb"><li class="breadcrumb-item">AulaPro</li><li class="breadcrumb-item"><a href="{% url 'empleados:establecimientos_list' %}">Establecimientos</a></li><li class="breadcrumb-item"><a href="{% url 'empleados:establecimiento_detail' establecimiento.id %}">{{ establecimiento.nombre }}</a></li><li class="breadcrumb-item"><a href="{% url 'empleados:ciclo_detail' establecimiento.id ciclo.id %}">{{ ciclo.nombre }}</a></li><li class="breadcrumb-item active">{{ titulo }}</li></ol></div></div></div></div>
<div class="container-fluid"><div class="card"><div class="card-body"><form method="post" class="row g-3">{% csrf_token %}<div class="col-md-8"><label class="form-label">Nombre</label>{{ form.nombre }}</div><div class="col-md-4 d-flex align-items-center gap-2">{{ form.activo }}<label class="form-label mb-0">Activa</label></div><div class="col-12 d-flex gap-2"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-outline-secondary" href="{% url 'empleados:ciclo_detail' establecimiento.id ciclo.id %}">Cancelar</a></div></form></div></div></div></div>
{% endblock %}
