{% extends 'sitio_web/base_public.html' %}
{% block title %}{{ servicio.titulo }} | {{ sitio_config.nombre_sitio }}{% endblock %}
{% block content %}
<section class="inner-hero"><div class="container"><h1>{{ servicio.titulo }}</h1><p>{{ servicio.resumen }}</p></div></section>
<section class="py-5"><div class="container"><div class="row g-4"><div class="col-lg-7"><p>{{ servicio.descripcion|linebreaks }}</p></div><div class="col-lg-5">{% if servicio.imagen_portada %}<img src="{{ servicio.imagen_portada.url }}" class="img-fluid rounded-4 shadow" alt="{{ servicio.titulo }}">{% endif %}</div></div></div></section>
{% endblock %}
