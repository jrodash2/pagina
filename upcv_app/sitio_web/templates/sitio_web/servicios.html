{% extends 'sitio_web/base_public.html' %}
{% block title %}Servicios | {{ sitio_config.nombre_sitio }}{% endblock %}
{% block content %}
<section class="inner-hero"><div class="container"><h1>Servicios</h1></div></section>
<section class="py-5"><div class="container"><div class="row g-3">{% for s in servicios %}<div class="col-md-6 col-lg-4"><div class="card h-100 shadow-sm"><div class="card-body"><i class="{{ s.icono|default:'fa fa-cogs' }} fa-2x text-primary"></i><h5 class="mt-3">{{ s.titulo }}</h5><p>{{ s.resumen }}</p><a href="{{ s.get_absolute_url }}" class="btn btn-outline-primary btn-sm">Detalles</a></div></div></div>{% endfor %}</div></div></section>
{% endblock %}
