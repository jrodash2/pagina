{% extends 'sitio_web/base_public.html' %}
{% block title %}Proyectos | {{ sitio_config.nombre_sitio }}{% endblock %}
{% block content %}
<section class="inner-hero"><div class="container"><h1>Proyectos</h1></div></section>
<section class="py-5"><div class="container"><div class="row g-3">{% for p in proyectos %}<div class="col-md-6 col-lg-4"><div class="card h-100 shadow-sm">{% if p.imagen_portada %}<img src="{{ p.imagen_portada.url }}" class="card-img-top project-thumb" alt="{{ p.titulo }}">{% endif %}<div class="card-body"><h5>{{ p.titulo }}</h5><p>{{ p.resumen }}</p><a href="{{ p.get_absolute_url }}" class="btn btn-outline-primary btn-sm">Ver proyecto</a></div></div></div>{% endfor %}</div></div></section>
{% endblock %}
