{% load static %}
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{% static 'assets/css/vendors/bootstrap.css' %}"><link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
<title>Acceso CMS</title></head><body class="bg-light">
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-4"><div class="card shadow">
<div class="card-body"><h4 class="mb-3">Acceso CMS</h4>
<form method="post">{% csrf_token %}{{ form.non_field_errors }}
<div class="mb-2"><label>Usuario</label>{{ form.username }}</div>
<div class="mb-2"><label>Contraseña</label>{{ form.password }}</div>
<button class="btn btn-primary w-100" type="submit">Ingresar</button>
</form></div></div></div></div></div>
</body></html>
